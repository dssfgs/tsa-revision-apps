<title>TSA 中三數學 MC 溫習 App</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root{--blue:#1565c0;--green:#2e7d32;--red:#c62828;--orange:#ef6c00;--bg:#f4f6fb;}
*{box-sizing:border-box;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;}
body{margin:0;background:var(--bg);color:#222;}
header{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;padding:16px 20px;}
header h1{margin:0;font-size:20px;}
header p{margin:4px 0 0;font-size:12px;opacity:.92;}
.notice{background:#fff8e1;border-bottom:1px solid #ffe082;color:#795548;font-size:12px;padding:8px 14px;text-align:center;}
nav{display:flex;gap:6px;background:#fff;padding:8px;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:10;flex-wrap:wrap;}
nav button{flex:1;min-width:80px;padding:9px 4px;border:none;border-radius:8px;background:#e3e9f5;color:#1565c0;font-size:13px;font-weight:bold;cursor:pointer;}
nav button.active{background:var(--blue);color:#fff;}
.wrap{max-width:780px;margin:0 auto;padding:14px;}
.card{background:#fff;border-radius:12px;padding:15px;margin-bottom:13px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.topic-tag{display:inline-block;background:#e3e9f5;color:#1565c0;font-size:12px;padding:3px 10px;border-radius:20px;}
.qno{font-size:11px;color:#999;}
.stem{font-size:16px;font-weight:600;margin:6px 0 10px;line-height:1.6;}
.fig{text-align:center;margin:8px 0;}
.opt{display:block;width:100%;text-align:left;padding:11px 14px;margin:6px 0;border:2px solid #e0e0e0;border-radius:10px;background:#fafafa;cursor:pointer;font-size:15px;}
.opt:hover{border-color:var(--blue);}
.opt.sel{border-color:var(--blue);background:#e3f2fd;}
.opt.correct{border-color:var(--green);background:#e8f5e9;}
.opt.wrong{border-color:var(--red);background:#ffebee;}
.opt .lbl{font-weight:bold;margin-right:8px;color:#1565c0;}
.opt:disabled{cursor:default;}
.explain{margin-top:10px;padding:12px;border-radius:10px;font-size:14px;line-height:1.7;}
.explain.ok{background:#e8f5e9;border-left:4px solid var(--green);}
.explain.no{background:#fff3e0;border-left:4px solid var(--orange);}
.explain b{color:var(--red);}
.topicbar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.topicbar button{padding:6px 11px;border:1px solid #1565c0;background:#fff;color:#1565c0;border-radius:20px;font-size:12px;cursor:pointer;}
.topicbar button.active{background:#1565c0;color:#fff;}
.stat{display:flex;gap:10px;margin-bottom:14px;}
.stat .box{flex:1;background:#fff;border-radius:10px;padding:11px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.stat .num{font-size:23px;font-weight:bold;}
.stat .lab{font-size:11px;color:#666;}
.empty{text-align:center;color:#888;padding:40px 14px;line-height:1.7;}
.btn{display:inline-block;padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;color:#fff;font-weight:bold;}
.btn.r{background:#c62828;}.btn.b{background:#1565c0;}.btn.g{background:#2e7d32;}.btn.gray{background:#666;}
.center{text-align:center;margin:14px 0;}
.src{font-size:10px;color:#bbb;margin-top:8px;}
.timer{position:sticky;top:54px;background:#fff3e0;border:1px solid #ffcc80;border-radius:10px;padding:10px;text-align:center;margin-bottom:12px;z-index:5;}
.timer .t{font-size:22px;font-weight:bold;color:var(--orange);}
.setup label{display:block;margin:10px 0 4px;font-size:14px;font-weight:bold;}
.setup select{width:100%;padding:9px;border:1px solid #ccc;border-radius:8px;font-size:15px;}
.result-big{font-size:42px;font-weight:bold;text-align:center;margin:10px 0;}
.bar{height:10px;background:#eee;border-radius:6px;overflow:hidden;margin:6px 0;}
.bar>span{display:block;height:100%;background:var(--green);}
svg{max-width:100%;height:auto;}
.toggle{font-size:12px;color:#1565c0;cursor:pointer;user-select:none;}
.modechip{display:inline-block;font-size:11px;background:#ede7f6;color:#5e35b1;padding:2px 8px;border-radius:10px;margin-left:6px;}
#toTop{position:fixed;right:18px;bottom:18px;z-index:999;width:46px;height:46px;border:none;border-radius:50%;background:#1565c0;color:#fff;font-size:22px;cursor:pointer;display:none;box-shadow:0 2px 8px rgba(0,0,0,.3)}#toTop:hover{background:#0d47a1}
.opt{transition:background .25s ease,border-color .25s ease,transform .12s ease}
.opt:not([disabled]):hover{transform:translateY(-1px)}
.opt:active{transform:scale(.99)}
nav button{transition:background .2s ease,color .2s ease}
.explain{animation:fadeIn .35s ease}
.fade-in{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.bmbtn{border:none;background:none;cursor:pointer;font-size:20px;line-height:1;padding:2px 4px;color:#f9a825;transition:transform .15s ease}
.bmbtn:hover{transform:scale(1.25)}
.bmbtn.on{filter:drop-shadow(0 0 2px #f9a82588)}
.search{flex:1;min-width:180px;padding:8px 12px;border:1px solid #cfd8dc;border-radius:8px;font-size:14px}
.search:focus{outline:none;border-color:#1565c0;box-shadow:0 0 0 2px #1565c022}
.pager{display:flex;align-items:center;gap:14px;justify-content:center;margin:10px 0}
.pageinfo{font-weight:600;color:#37474f}
.single-wrap{max-width:760px;margin:0 auto}
.bounce{animation:bounce .5s ease}
@keyframes bounce{0%{transform:scale(1)}30%{transform:scale(1.04)}60%{transform:scale(.99)}100%{transform:scale(1)}}
.confetti{position:fixed;top:-10px;width:9px;height:14px;z-index:9999;pointer-events:none;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.2}}

.streakbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:linear-gradient(90deg,#fff8e1,#fff);border:1px solid #ffe082;border-radius:10px;padding:8px 14px;margin:10px 0;font-size:14px;font-weight:600;color:#6d4c00}
.streakbar .flame{font-size:20px}
.streakbar .best{margin-left:auto;font-weight:500;color:#8d6e63;font-size:13px}
.toast{position:fixed;left:50%;top:80px;transform:translateX(-50%) translateY(-10px);background:#1565c0;color:#fff;padding:12px 22px;border-radius:30px;font-size:15px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:10000;opacity:0;transition:opacity .3s ease,transform .3s ease;animation:toastIn .3s ease forwards}
@keyframes toastIn{to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast.out{opacity:0;transform:translateX(-50%) translateY(-10px)}

.sr-info{background:#e3f2fd;border:1px solid #90caf9;font-size:13px;line-height:1.6;color:#1565c0}
.srprog{font-size:13px;color:#555;margin:-4px 0 14px;display:flex;align-items:center;gap:6px}
.srdot{display:inline-block;width:12px;height:12px;border-radius:50%;background:#e0e0e0;margin-right:2px}
.srdot.on{background:#2e7d32}
.later-card{opacity:.85}
.toast.big{background:#2e7d32;font-size:16px;max-width:90vw;text-align:center}

.gear{position:fixed;top:10px;right:12px;z-index:50;background:#fff;border:1px solid #ddd;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.12);transition:transform .2s ease}
.gear:hover{transform:rotate(40deg)}
.nv-ic{font-size:17px}
.nv-lb{margin-left:5px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:10001}
.modal-bg.open{display:flex;animation:fadeIn .25s ease}
.modal{background:#fff;border-radius:14px;padding:22px 24px;width:90%;max-width:360px;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.modal h3{margin:0 0 16px}
.setrow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0;font-size:15px;cursor:pointer}
.setrow input{width:20px;height:20px;cursor:pointer}
.sethint{font-size:12px;color:#888;margin:12px 0 16px;line-height:1.5}
/* ---- Mobile bottom navigation ---- */
@media (max-width:600px){
  nav{position:fixed;left:0;right:0;bottom:0;top:auto;margin:0;border-radius:0;border-top:1px solid #e0e0e0;border-bottom:none;background:#fff;display:flex;flex-wrap:nowrap;justify-content:space-around;padding:4px 0 max(4px,env(safe-area-inset-bottom));box-shadow:0 -2px 10px rgba(0,0,0,.08);z-index:60}
  nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;margin:0;border:none;border-radius:0;background:none;font-size:10px;min-width:0}
  nav button.active{background:none;color:#1565c0}
  .nv-ic{font-size:20px}
  .nv-lb{margin-left:0;font-size:10px;line-height:1.1}
  body{padding-bottom:64px}
  .gear{top:auto;bottom:72px;right:10px}
}

html{-webkit-text-size-adjust:100%;}
body{-webkit-tap-highlight-color:transparent;}
/* respect iPhone notch / safe areas */
header{padding-top:env(safe-area-inset-top);}
@media (max-width:600px){
  body{padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);}
}
/* When launched as installed app (standalone), give header a bit more top room for the status bar */
@media (display-mode:standalone){
  header{padding-top:calc(env(safe-area-inset-top) + 8px);}
  .gear{top:calc(env(safe-area-inset-top) + 10px);}
}
/* prevent text selection feeling like a webpage on option buttons */
nav button,.opt,.btn{-webkit-user-select:none;user-select:none;}

.ios-install{position:fixed;left:8px;right:8px;bottom:8px;z-index:9000;background:#1565c0;color:#fff;border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.5;display:flex;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.ios-install button{flex:none;background:#fff;color:#1565c0;border:none;border-radius:8px;padding:6px 12px;font-weight:700;cursor:pointer}
@media (max-width:600px){ .ios-install{bottom:72px} }
</style>
</head>

const LABELS=["A","B","C","D"];
let errorBook=lsGet("tsa_eb",[]);
let srData=lsGet("tsa_sr",{});
let answered=lsGet("tsa_ans",{});
let currentYear=2025, currentTopic="全部", currentPaper=1, view="practice";
let bookmarks=lsGet("tsa_bm",[]);
let singleMode=lsGet("tsa_single",false);
let curIndex=0, searchTerm="";
let streak=lsGet("tsa_streak",0), bestStreak=lsGet("tsa_best",0);
let settings=lsGet("tsa_set",{sound:true,confetti:true});
let quiz=null, quizTimer=null;
let shuffleOn = lsGet("tsa_shuffle",true);
let orderCache = {};

function save(){lsSet("tsa_eb",errorBook);lsSet("tsa_sr",srData);lsSet("tsa_ans",answered);lsSet("tsa_bm",bookmarks);lsSet("tsa_single",singleMode);lsSet("tsa_streak",streak);lsSet("tsa_best",bestStreak);}
function yearList(){return Array.from(new Set(QUESTIONS.map(q=>q.year))).sort((a,b)=>b-a);}
function byYear(){return QUESTIONS.filter(q=>q.year===currentYear);}
function topics(){return ["全部",...Array.from(new Set(byYear().map(q=>q.topic)))];}
function yearBar(){return `<div class="topicbar">`+yearList().map(y=>`<button class="${y===currentYear?'active':''}" style="border-color:#5e35b1;color:${y===currentYear?'#fff':'#5e35b1'};background:${y===currentYear?'#5e35b1':'#fff'}" onclick="setYear(${y})">${y} 年</button>`).join("")+`</div>`;}
function setYear(y){curIndex=0;currentYear=y;currentTopic="全部";currentPaper=1;draw();}
function fig(q){return q.fig&&FIGS[q.fig]?`<div class="fig">${FIGS[q.fig]}</div>`:"";}
function renderMath(){ if(window.renderMathInElement){ renderMathInElement(document.getElementById("app"),{delimiters:[{left:"\\(",right:"\\)",display:false}],throwOnError:false}); } }

function shuffleIdx(n){let a=[...Array(n).keys()];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getOrder(id,len){ if(!shuffleOn) return [...Array(len).keys()]; if(!orderCache[id]) orderCache[id]=shuffleIdx(len); return orderCache[id]; }

/* mode: 'practice' (instant feedback), 'quiz' (no feedback until submit), 'review' (locked, show answers) */
function qCard(q,opts){
  opts=opts||{};
  const mode=opts.mode||'practice';
  const a = opts.forceAns!==undefined?opts.forceAns:answered[q.id]; // original index chosen
  const order = getOrder(q.id,q.options.length);
  const reveal = (mode==='review') || (mode==='practice' && a!==undefined);
  const locked = (mode==='review') || (mode==='practice' && a!==undefined);
  let obtns=order.map((origIdx,pos)=>{
     let cls="opt";
     if(reveal){ if(origIdx===a){ cls += (a===q.ans) ? " sel" : " wrong"; } }
     else if(a===origIdx){ cls+=" sel"; } // hide correct option; only show student's own choice
     return `<button class="${cls}" ${locked?'disabled':''} onclick="${opts.handler||'pick'}('${q.id}',${origIdx})"><span class="lbl">${LABELS[pos]}.</span>${q.options[origIdx]}</button>`;
  }).join("");
  let exp="";
  if(reveal){
     if(a===q.ans) exp=`<div class="explain ok">✅ 你的選擇正確！<br>💡 解題思路：${q.exp}</div>`;
     else if(a!==undefined) exp=`<div class="explain no">❌ 你選的答案有問題：<b>${q.wrong[a]||"此選項不正確，請再想想。"}</b><br>💡 解題思路：${q.exp}<br><span style="color:#666">（請依思路自行重新判斷正確選項）</span></div>`;
     else exp=`<div class="explain ok">💡 解題思路：${q.exp}</div>`;
  }
  return `<div class="card fade-in"><div class="qhead"><span class="topic-tag">${q.topic}</span><span style="display:flex;align-items:center;gap:8px"><button class="bmbtn ${bookmarks.includes(q.id)?'on':''}" onclick="toggleBookmark('${q.id}',event)" title="收藏／取消收藏">${bookmarks.includes(q.id)?'⭐':'☆'}</button><span class="qno">卷${q.paper}・第${q.no}題</span></span></div>
    <div class="stem">${q.stem}</div>${fig(q)}${obtns}${exp}
    <div class="src">改編自 TSA ${q.year} 9MC${q.paper}（教育局／香港考評局）</div></div>`;
}

function pick(id,i){
  var firstTime=(answered[id]===undefined);
  answered[id]=i;
  const q=QUESTIONS.find(x=>x.id===id);
  var correct=(i===q.ans);
  if(!correct){ if(!errorBook.includes(id)){errorBook.push(id);} srAdd(id); } else { errorBook=errorBook.filter(x=>x!==id); delete srData[id]; }
  var milestone=0;
  if(firstTime){
    if(correct){ streak++; if(streak>bestStreak)bestStreak=streak;
      if(streak%10===0)milestone=10; else if(streak%5===0)milestone=5;
    } else { streak=0; }
  }
  save();draw();
  if(correct)celebrate();
  if(milestone)cheer(milestone);
}
function cheer(n){
  var msg=n>=10?("🔥 太厲害了！連續答對 "+streak+" 題！"):("🎉 連續答對 "+streak+" 題，繼續加油！");
  var t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t);
  if(settings.sound){try{var ac=new (window.AudioContext||window.webkitAudioContext)();var o=ac.createOscillator();var g=ac.createGain();
    o.connect(g);g.connect(ac.destination);o.type="sine";o.frequency.value=n>=10?880:660;
    g.gain.setValueAtTime(0.001,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.2,ac.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.4);o.start();o.stop(ac.currentTime+0.4);}catch(e){}}
  setTimeout(function(){t.classList.add("out");},1800);
  setTimeout(function(){t.remove();},2300);
}

function openSettings(){
  document.getElementById("setSound").checked=!!settings.sound;
  document.getElementById("setConfetti").checked=!!settings.confetti;
  document.getElementById("settingsModal").classList.add("open");
}
function closeSettings(){ document.getElementById("settingsModal").classList.remove("open"); }
function setOpt(k,v){ settings[k]=v; lsSet("tsa_set",settings); }

function celebrate(){
  if(!settings.confetti)return;
  var cols=["#e53935","#43a047","#1e88e5","#fdd835","#8e24aa","#fb8c00"];
  for(var k=0;k<18;k++){(function(k){
    var c=document.createElement("div");c.className="confetti";
    c.style.left=(Math.random()*100)+"vw";
    c.style.background=cols[k%cols.length];
    c.style.animationDuration=(0.9+Math.random()*0.8)+"s";
    c.style.transform="rotate("+(Math.random()*360)+"deg)";
    document.body.appendChild(c);
    setTimeout(function(){c.remove();},1800);
  })(k);}
}
function clearError(){if(confirm("確定清空錯題簿？")){errorBook=[];srData={};save();draw();}}

var SR_INTERVALS=[0,1,3,7];      // days until next review per box level
var SR_GRADUATE=3;               // box level needed to graduate (3 correct reviews)
function todayStr(){var d=new Date();d.setHours(0,0,0,0);return d.getTime();}
function dayMs(){return 86400000;}
function srAdd(id){ if(!srData[id]) srData[id]={box:0,reps:0,due:todayStr()}; }
function srReview(id,correct){
  srAdd(id);
  var s=srData[id];
  if(correct){
    s.box=Math.min(SR_GRADUATE,s.box+1); s.reps=(s.reps||0)+1;
    if(s.box>=SR_GRADUATE){ // graduate: remove from error book
      errorBook=errorBook.filter(x=>x!==id); delete srData[id]; return "graduate";
    }
    s.due=todayStr()+SR_INTERVALS[s.box]*dayMs(); return "promote";
  } else {
    s.box=0; s.reps=0; s.due=todayStr(); return "reset";
  }
}
function srDueList(){ return QUESTIONS.filter(function(q){
  return errorBook.includes(q.id) && (!srData[q.id] || srData[q.id].due<=todayStr()); }); }
function srLaterList(){ return QUESTIONS.filter(function(q){
  return errorBook.includes(q.id) && srData[q.id] && srData[q.id].due>todayStr(); }); }
function srNextDateLabel(id){
  if(!srData[id]) return "今天";
  var diff=Math.ceil((srData[id].due-todayStr())/dayMs());
  if(diff<=0) return "今天";
  if(diff===1) return "明天";
  return diff+" 天後";
}

function pickReview(id,i){
  answered[id]=i;
  const q=QUESTIONS.find(x=>x.id===id);
  var correct=(i===q.ans);
  var r=srReview(id,correct);
  save();draw();
  if(correct){
    celebrate();
    var msg=(r==="graduate")?("🎓 太好了！「"+q.topic+"」這題已完全掌握，移出錯題簿！"):
            ("👍 答對！下次複習："+srNextDateLabel(id));
    srToast(msg, r==="graduate");
  } else {
    srToast("再接再厲，這題明天會再出現複習。", false);
  }
}
function srToast(msg,big){
  var t=document.createElement("div"); t.className="toast"+(big?" big":"");
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(function(){t.classList.add("out");},2200);
  setTimeout(function(){t.remove();},2700);
}
function markMastered(id){errorBook=errorBook.filter(x=>x!==id);delete answered[id];save();draw();}
function resetAll(){if(confirm("重設所有作答紀錄？")){errorBook=[];answered={};srData={};orderCache={};save();draw();}}
function resetAnswers(){
  if(confirm("清除所有已作答紀錄，重新練習？（錯題簿會保留）")){
    answered={}; orderCache={}; save(); draw();
    window.scrollTo({top:0,behavior:"smooth"});
  }
}
function exportProgress(){
  var data={tsa_eb:errorBook,tsa_ans:answered,tsa_shuffle:shuffleOn,exported:new Date().toISOString()};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);var a=document.createElement("a");
  a.href=url;a.download="TSA溫習進度_"+new Date().toISOString().slice(0,10)+".json";a.click();
}
function importProgress(input){
  var f=input.files[0];if(!f)return;var r=new FileReader();
  r.onload=function(e){try{var d=JSON.parse(e.target.result);
    if(Array.isArray(d.tsa_eb))errorBook=d.tsa_eb;
    if(d.tsa_ans&&typeof d.tsa_ans==="object")answered=d.tsa_ans;
    if(typeof d.tsa_shuffle==="boolean")shuffleOn=d.tsa_shuffle;
    save();lsSet("tsa_shuffle",shuffleOn);orderCache={};
    alert("已匯入進度：錯題 "+errorBook.length+" 題，已作答 "+Object.keys(answered).length+" 題。");draw();
  }catch(err){alert("匯入失敗：檔案格式不正確。");}};
  r.readAsText(f);input.value="";
}
function toggleShuffle(){shuffleOn=!shuffleOn;lsSet("tsa_shuffle",shuffleOn);orderCache={};draw();}
function toggleBookmark(id,ev){ if(ev)ev.stopPropagation();
  if(bookmarks.includes(id))bookmarks=bookmarks.filter(x=>x!==id); else bookmarks.push(id);
  save(); draw();
}
function toggleSingle(){ singleMode=!singleMode; curIndex=0; save(); draw(); }
function onSearch(v){ searchTerm=v; draw();
  var el=document.getElementById("searchBox"); if(el){el.focus(); el.setSelectionRange(el.value.length,el.value.length);} }
function navQ(d,total){ curIndex=Math.max(0,Math.min(total-1,curIndex+d)); draw(); window.scrollTo({top:0,behavior:"smooth"}); }
function matchesSearch(q){ if(!searchTerm.trim())return true;
  var s=(q.stem+" "+q.topic+" "+q.options.join(" ")).toLowerCase();
  return s.indexOf(searchTerm.toLowerCase())>=0;
}
function shuffleCtrl(){return `<div class="card" style="padding:10px 14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between"><span class="toggle" onclick="toggleShuffle()">🔀 選項隨機排列：<b>${shuffleOn?'開啟':'關閉'}</b>（點擊切換）</span><button class="btn b" onclick="resetAnswers()">🔄 重新練習（清除作答）</button></div>`;}

function streakBar(){
  return `<div class="streakbar"><span class="flame">${streak>0?'🔥':'💤'}</span>`
    +`<span>連續答對：<b>${streak}</b> 題</span>`
    +`<span class="best">最佳紀錄：${bestStreak} 題</span></div>`;
}
function statBox(list){
  let done=list.filter(q=>answered[q.id]!==undefined).length;
  let cor=list.filter(q=>answered[q.id]===q.ans).length;
  return `<div class="stat"><div class="box"><div class="num">${list.length}</div><div class="lab">題數</div></div>
    <div class="box"><div class="num" style="color:#2e7d32">${cor}</div><div class="lab">答對</div></div>
    <div class="box"><div class="num" style="color:#c62828">${done-cor}</div><div class="lab">答錯</div></div></div>`;
}

/* ---------- QUIZ ---------- */
function quizSetup(){
  return `<div class="card setup"><h3 style="margin-top:0">⏱️ 計時測驗設定<span class="modechip">交卷前不顯示對錯</span><br><span style="font-size:12px;color:#5e35b1">目前年份：${currentYear} 年（在「分題練習」頂部切換年份）</span></h3>
    <label>範圍</label><select id="qScope">
      <option value="all">全部 80 題</option>
      <option value="p1">卷一</option><option value="p2">卷二</option><option value="p3">卷三</option><option value="p4">卷四</option>
      <option value="errors">只測錯題簿</option></select>
    <label>題數</label><select id="qCount"><option>10</option><option>20</option><option>30</option><option value="999">全部</option></select>
    <label>每題秒數（總時間 = 題數 × 秒數）</label><select id="qSec"><option value="60">60 秒</option><option value="90" selected>90 秒</option><option value="120">120 秒</option><option value="0">不限時</option></select>
    <p style="font-size:12px;color:#888">📌 本 App 為單機自我溫習版，正解儲存在頁面內，並非保密的正式測驗系統。</p>
    <div class="center"><button class="btn b" onclick="startQuiz()">開始測驗</button></div></div>`;
}
function startQuiz(){
  let scope=document.getElementById("qScope").value;
  let pool=byYear().slice();
  if(scope.startsWith("p"))pool=pool.filter(q=>q.paper==scope[1]);
  if(scope==="errors")pool=QUESTIONS.filter(q=>errorBook.includes(q.id));
  if(pool.length===0){alert("此範圍沒有題目。");return;}
  let cnt=parseInt(document.getElementById("qCount").value);
  let sec=parseInt(document.getElementById("qSec").value);
  pool=shuffleIdx(pool.length).map(i=>pool[i]).slice(0,Math.min(cnt,pool.length));
  orderCache={};
  quiz={items:pool,ans:{},submitted:false,left:sec*pool.length,sec:sec};
  if(quizTimer)clearInterval(quizTimer);
  if(sec>0){quizTimer=setInterval(()=>{quiz.left--;if(quiz.left<=0){clearInterval(quizTimer);submitQuiz();}else updateTimer();},1000);}
  draw();
}
function updateTimer(){let el=document.getElementById("timerT");if(el){let m=Math.floor(quiz.left/60),s=quiz.left%60;el.textContent=`${m}:${s<10?'0':''}${s}`;}}
function quizPick(id,i){if(quiz.submitted)return;quiz.ans[id]=i;draw();}
function submitQuiz(){if(quizTimer)clearInterval(quizTimer);if(!quiz.submitted&&Object.keys(quiz.ans).length<quiz.items.length){if(!confirm("尚有題目未作答，確定交卷？"))return;}quiz.submitted=true;
  quiz.items.forEach(q=>{let a=quiz.ans[q.id];if(a!==undefined){answered[q.id]=a;if(a!==q.ans){if(!errorBook.includes(q.id))errorBook.push(q.id);}}});
  save();draw();}
function exportResult(){
  let rows=[["卷","題號","課題","你的答案","結果"]];
  quiz.items.forEach(q=>{let a=quiz.ans[q.id];rows.push([q.paper,q.no,q.topic,a!==undefined?LABELS[a]:"未答",a===q.ans?"正確":"錯誤"]);});
  let cor=quiz.items.filter(q=>quiz.ans[q.id]===q.ans).length;
  rows.unshift(["TSA 測驗成績","得分",`${cor}/${quiz.items.length}`,`${Math.round(cor/quiz.items.length*100)}分`,"日期",new Date().toLocaleString("zh-HK")]);
  let csv="\uFEFF"+rows.map(r=>r.join(",")).join("\n");
  let blob=new Blob([csv],{type:"text/csv"});let url=URL.createObjectURL(blob);
  let a=document.createElement("a");a.href=url;a.download="TSA成績.csv";a.click();
}
function topicReport(items,ansMap){
  let m={};
  items.forEach(q=>{if(!m[q.topic])m[q.topic]={c:0,t:0};m[q.topic].t++;if(ansMap[q.id]===q.ans)m[q.topic].c++;});
  let rows=Object.keys(m).sort((a,b)=>(m[a].c/m[a].t)-(m[b].c/m[b].t)).map(t=>{
    let p=Math.round(m[t].c/m[t].t*100);
    let col=p>=80?'#2e7d32':(p>=50?'#f9a825':'#c62828');
    return `<div style="display:flex;align-items:center;gap:8px;margin:4px 0">
      <span style="flex:0 0 110px;font-size:13px">${t}</span>
      <div class="bar" style="flex:1"><span style="width:${p}%;background:${col}"></span></div>
      <span style="flex:0 0 64px;text-align:right;font-size:13px;color:${col}">${m[t].c}/${m[t].t} (${p}%)</span></div>`;
  }).join("");
  return `<div class="card"><b>📊 各課題正確率</b><p style="font-size:12px;color:#666;margin:4px 0">由低至高排序，紅色為最需加強的課題。</p>${rows}</div>`;
}
function renderQuiz(){
  if(!quiz)return quizSetup();
  if(quiz.submitted){
     let cor=quiz.items.filter(q=>quiz.ans[q.id]===q.ans).length;
     let pct=Math.round(cor/quiz.items.length*100);
     let h=`<div class="card"><div class="result-big" style="color:${pct>=60?'#2e7d32':'#c62828'}">${cor} / ${quiz.items.length}</div>
       <div class="bar"><span style="width:${pct}%"></span></div><p style="text-align:center">得分率 ${pct}%</p>
       <div class="center"><button class="btn g" onclick="exportResult()">📥 匯出成績 CSV</button> <button class="btn b" onclick="quiz=null;orderCache={};draw()">再測一次</button></div></div>`;
     h+=topicReport(quiz.items,quiz.ans);
     h+=quiz.items.map(q=>qCard(q,{forceAns:quiz.ans[q.id],mode:'review'})).join("");
     return h;
  }
  let timer=quiz.sec>0?`<div class="timer">剩餘時間 <span class="t" id="timerT"></span></div>`:"";
  let done=Object.keys(quiz.ans).length;
  let h=timer+`<div class="card"><b>進度：${done} / ${quiz.items.length}</b><span class="modechip">交卷前不顯示對錯</span>
     <div class="center"><button class="btn r" onclick="submitQuiz()">交卷</button></div></div>`;
  h+=quiz.items.map(q=>qCard(q,{forceAns:quiz.ans[q.id],mode:'quiz',handler:"quizPick"})).join("");
  h+=`<div class="center"><button class="btn r" onclick="submitQuiz()">交卷並查看解答</button></div>`;
  return h;
}

function renderList(list, footerHtml){
  list = list.filter(matchesSearch);
  if(list.length===0) return `<div class="empty">🔍 找不到符合「${searchTerm}」的題目。</div>`;
  if(singleMode){
    if(curIndex>=list.length)curIndex=0;
    var q=list[curIndex];
    return `<div class="single-wrap fade-in">`+qCard(q,{mode:'practice'})+`</div>`
      +`<div class="center pager"><button class="btn b" ${curIndex===0?'disabled':''} onclick="navQ(-1,${list.length})">← 上一題</button>`
      +`<span class="pageinfo">第 ${curIndex+1} / ${list.length} 題</span>`
      +`<button class="btn b" ${curIndex===list.length-1?'disabled':''} onclick="navQ(1,${list.length})">下一題 →</button></div>`;
  }
  return list.map(q=>qCard(q,{mode:'practice'})).join("");
}
function modeBar(){
  return `<div class="card" style="padding:10px 14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between">`
   +`<input id="searchBox" class="search" type="text" placeholder="🔍 搜尋題目／課題／選項…" value="${searchTerm}" oninput="onSearch(this.value)">`
   +`<span class="toggle" onclick="toggleSingle()">${singleMode?'📄 切換列表模式':'🎯 切換單題模式'}</span></div>`;
}

function allTopics(){return Array.from(new Set(QUESTIONS.map(q=>q.topic)));}
function topicStats(){
  return allTopics().map(t=>{
    var qs=QUESTIONS.filter(q=>q.topic===t);
    var done=qs.filter(q=>answered[q.id]!==undefined);
    var cor=qs.filter(q=>answered[q.id]===q.ans).length;
    return {topic:t,total:qs.length,done:done.length,correct:cor,
      rate: done.length? Math.round(cor/done.length*100):0};
  });
}
function radarSVG(stats){
  var n=stats.length, cx=210, cy=210, R=150, levels=4;
  if(n<3) return '';
  function pt(i,r){var a=-Math.PI/2 + i*2*Math.PI/n; return [cx+r*Math.cos(a), cy+r*Math.sin(a)];}
  var g='';
  for(var L=1;L<=levels;L++){var rr=R*L/levels,pts=[];for(var i=0;i<n;i++){var p=pt(i,rr);pts.push(p[0].toFixed(1)+','+p[1].toFixed(1));}
    g+=`<polygon points="${pts.join(' ')}" fill="none" stroke="#e0e0e0" stroke-width="1"/>`;}
  for(var i=0;i<n;i++){var p=pt(i,R);g+=`<line x1="${cx}" y1="${cy}" x2="${p[0].toFixed(1)}" y2="${p[1].toFixed(1)}" stroke="#e0e0e0"/>`;}
  var dpts=[];for(var i=0;i<n;i++){var r=R*(stats[i].rate/100); var p=pt(i,r); dpts.push(p[0].toFixed(1)+','+p[1].toFixed(1));}
  g+=`<polygon points="${dpts.join(' ')}" fill="rgba(21,101,192,0.25)" stroke="#1565c0" stroke-width="2"/>`;
  for(var i=0;i<n;i++){var r=R*(stats[i].rate/100);var p=pt(i,r);g+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="#1565c0"/>`;}
  for(var i=0;i<n;i++){var p=pt(i,R+24);var anchor=Math.abs(p[0]-cx)<8?'middle':(p[0]>cx?'start':'end');
    g+=`<text x="${p[0].toFixed(1)}" y="${p[1].toFixed(1)}" text-anchor="${anchor}" dominant-baseline="middle" font-size="12" fill="#37474f">${stats[i].topic}</text>`;
    g+=`<text x="${p[0].toFixed(1)}" y="${(p[1]+14).toFixed(1)}" text-anchor="${anchor}" font-size="11" fill="#1565c0">${stats[i].done?stats[i].rate+'%':'—'}</text>`;}
  return `<svg viewBox="0 0 420 440" width="100%" style="max-width:480px">${g}</svg>`;
}
function renderReport(){
  var stats=topicStats();
  var totalDone=QUESTIONS.filter(q=>answered[q.id]!==undefined).length;
  var totalCor=QUESTIONS.filter(q=>answered[q.id]===q.ans).length;
  var overall=totalDone?Math.round(totalCor/totalDone*100):0;
  var weak=stats.filter(s=>s.done>0).sort((a,b)=>a.rate-b.rate).slice(0,3);
  var H=`<div class="stat">
    <div class="box"><div class="num">${totalDone}/${QUESTIONS.length}</div><div class="lab">已作答</div></div>
    <div class="box"><div class="num" style="color:#2e7d32">${overall}%</div><div class="lab">整體正確率</div></div>
    <div class="box"><div class="num" style="color:#f9a825">🔥 ${bestStreak}</div><div class="lab">最佳連勝</div></div></div>`;
  H+=`<div class="card" style="text-align:center"><h3 style="margin:4px 0 10px">各課題掌握度雷達圖</h3>`;
  if(totalDone===0) H+=`<div class="empty">開始作答後，這裡會顯示你在各課題的掌握度。</div>`;
  else H+=radarSVG(stats)+`<p style="font-size:12px;color:#888;margin-top:8px">百分比＝該課題已作答題目的正確率；「—」表示尚未作答。</p>`;
  H+=`</div>`;
  if(weak.length){H+=`<div class="card"><h3 style="margin:4px 0 10px">📌 建議優先複習</h3>`;
    H+=weak.map(s=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0"><span>${s.topic}</span><span style="color:${s.rate<50?'#c62828':'#f9a825'}">${s.rate}%（${s.correct}/${s.done}）</span></div>`).join("");
    H+=`</div>`;}
  return H;
}
function draw(){
  const app=document.getElementById("app");
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===view));
  if(view==="quiz"){app.innerHTML=renderQuiz();if(quiz&&!quiz.submitted&&quiz.sec>0)updateTimer();renderMath();return;}
  if(view==="report"){ app.innerHTML=renderReport(); renderMath(); return; }
  if(view==="errorbook"){
     QUESTIONS.forEach(q=>{ if(errorBook.includes(q.id)) srAdd(q.id); });
     const due=srDueList(), later=srLaterList();
     let H=`<div class="stat">
        <div class="box"><div class="num" style="color:#c62828">${errorBook.length}</div><div class="lab">錯題總數</div></div>
        <div class="box"><div class="num" style="color:#1565c0">${due.length}</div><div class="lab">今天待複習</div></div>
        <div class="box"><div class="num" style="color:#2e7d32">${later.length}</div><div class="lab">已排程</div></div></div>`;
     H+=`<div class="card sr-info">🔁 <b>間隔重複複習</b>：答錯的題目會在今天、隔 1 天、隔 3 天、隔 7 天重複出現。<b>連續答對 ${SR_GRADUATE} 次</b>後，系統才會判定你完全掌握並自動移出錯題簿。答錯則重新計算。</div>`;
     if(errorBook.length===0){
        H+=`<div class="empty">🎉 錯題簿是空的！<br>答錯的題目會自動收錄，並透過間隔重複幫你鞏固記憶。</div>`;
     } else {
        if(due.length===0){
           H+=`<div class="empty">✅ 今天的複習已完成！<br>還有 ${later.length} 題已排程，請明天再來複習。</div>`;
        } else {
           H+=`<h3 style="margin:14px 0 6px">📝 今天待複習（${due.length} 題）</h3>`;
           due.forEach(q=>{delete answered[q.id];});
           H+=due.map(q=>{
             var s=srData[q.id]||{box:0,reps:0};
             var dots=Array.from({length:SR_GRADUATE},(_,k)=>`<span class="srdot ${k<s.box?'on':''}"></span>`).join("");
             return `<div>`+qCard(q,{mode:'practice',handler:'pickReview'})
               +`<div class="srprog">熟練度：${dots} <span style="color:#888">（連續答對 ${s.box}/${SR_GRADUATE}）</span></div></div>`;
           }).join("");
        }
        if(later.length){
           H+=`<h3 style="margin:18px 0 6px;color:#888">⏳ 已排程，稍後複習（${later.length} 題）</h3>`;
           H+=later.map(q=>{
             var s=srData[q.id];
             return `<div class="card later-card"><div class="qhead"><span class="topic-tag">${q.topic}</span><span class="qno">卷${q.paper}・第${q.no}題</span></div>
               <div class="stem" style="opacity:.7">${q.stem}</div>
               <div class="srprog">下次複習：<b style="color:#1565c0">${srNextDateLabel(q.id)}</b>　熟練度 ${s.box}/${SR_GRADUATE}</div></div>`;
           }).join("");
        }
        H+=`<div class="center" style="margin-top:14px"><button class="btn gray" onclick="clearError()">清空錯題簿</button></div>`;
     }
     app.innerHTML=H;renderMath();return;
  }
  if(view==="bookmark"){
     const qs=QUESTIONS.filter(q=>bookmarks.includes(q.id));
     let H=`<div class="stat"><div class="box"><div class="num" style="color:#f9a825">${bookmarks.length}</div><div class="lab">收藏題</div></div></div>`;
     H+=modeBar();
     if(qs.length===0)H+=`<div class="empty">⭐ 收藏庫是空的！<br>在任何題目右上角按 ☆ 即可收藏，方便日後重溫。</div>`;
     else H+=renderList(qs);
     app.innerHTML=H;renderMath();return;
  }
  if(view==="paper"){
     let bar=`<div class="topicbar">`+[1,2,3,4].map(p=>`<button class="${p===currentPaper?'active':''}" onclick="setPaper(${p})">卷${p}</button>`).join("")+`</div>`;
     let list=byYear().filter(q=>q.paper===currentPaper);
     app.innerHTML=yearBar()+bar+modeBar()+streakBar()+shuffleCtrl()+statBox(list)+renderList(list)+`<div class="center" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center"><button class="btn b" onclick="exportProgress()">📤 匯出進度</button><button class="btn b" onclick="document.getElementById('impFile1').click()">📥 匯入進度</button><input type="file" id="impFile1" accept="application/json,.json,.txt" style="display:none" onchange="importProgress(this)"><button class="btn gray" onclick="resetAll()">重設所有紀錄</button></div>`;
     renderMath();return;
  }
  let bar=`<div class="topicbar">`+topics().map(t=>`<button class="${t===currentTopic?'active':''}" onclick="setTopic('${t}')">${t}</button>`).join("")+`</div>`;
  let list=currentTopic==="全部"?byYear():byYear().filter(q=>q.topic===currentTopic);
  app.innerHTML=yearBar()+bar+modeBar()+streakBar()+shuffleCtrl()+statBox(list)+renderList(list)+`<div class="center" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center"><button class="btn b" onclick="exportProgress()">📤 匯出進度</button><button class="btn b" onclick="document.getElementById('impFile2').click()">📥 匯入進度</button><input type="file" id="impFile2" accept="application/json,.json,.txt" style="display:none" onchange="importProgress(this)"><button class="btn gray" onclick="resetAll()">重設所有紀錄</button></div>`;
  renderMath();
}

<div id="settingsModal" class="modal-bg" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <h3>⚙️ 設定</h3>
    <label class="setrow"><span>🔊 答對音效</span>
      <input type="checkbox" id="setSound" onchange="setOpt('sound',this.checked)"></label>
    <label class="setrow"><span>🎉 紙屑特效 (Confetti)</span>
      <input type="checkbox" id="setConfetti" onchange="setOpt('confetti',this.checked)"></label>
    <p class="sethint">在圖書館等安靜環境，可關閉音效與特效。設定會自動儲存。</p>
    <div class="center"><button class="btn b" onclick="closeSettings()">完成</button></div>
  </div>
</div>
</body>
</html>
